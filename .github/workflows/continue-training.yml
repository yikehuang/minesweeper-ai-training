name: Continue Minesweeper Training

on:
  workflow_dispatch:
    inputs:
      games:
        description: 'New simulated games to append'
        required: true
        default: '500'
      epochs:
        description: 'Additional training epochs'
        required: true
        default: '5'
      width:
        description: 'Board width'
        required: true
        default: '30'
      height:
        description: 'Board height'
        required: true
        default: '16'
      mines:
        description: 'Mine count'
        required: true
        default: '99'
  push:
    branches: [main]
    paths:
      - '.github/continue-training-trigger.txt'

permissions:
  contents: write
  actions: read

jobs:
  continue-training:
    runs-on: ubuntu-latest

    env:
      RUN_GAMES: ${{ github.event.inputs.games || '500' }}
      RUN_EPOCHS: ${{ github.event.inputs.epochs || '5' }}
      RUN_WIDTH: ${{ github.event.inputs.width || '30' }}
      RUN_HEIGHT: ${{ github.event.inputs.height || '16' }}
      RUN_MINES: ${{ github.event.inputs.mines || '99' }}
      STATE_DIR: training_state

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore training cache
        uses: actions/cache@v4
        with:
          path: training_state
          key: minesweeper-training-state-${{ github.run_id }}
          restore-keys: |
            minesweeper-training-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy torch

      - name: Try downloading previous artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$STATE_DIR"
          if [ -f "$STATE_DIR/data_online.npz" ] && [ -f "$STATE_DIR/model_online.pt" ]; then
            echo "Cached dataset and model found."
            exit 0
          fi

          echo "No complete cache found. Trying to download latest previous artifact."
          set +e
          for WF in "continue-training.yml" "train-model.yml"; do
            RUN_ID=$(gh run list --workflow "$WF" --branch main --status success --limit 10 --json databaseId,headSha --jq "[.[] | select(.headSha != \"${GITHUB_SHA}\")] | .[0].databaseId")
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "Trying artifact from workflow $WF run $RUN_ID"
              gh run download "$RUN_ID" --name minesweeper-training-output --dir "$STATE_DIR"
              if [ -f "$STATE_DIR/data_online.npz" ]; then
                echo "Downloaded previous training artifact."
                break
              fi
            fi
          done
          set -e
          ls -lah "$STATE_DIR" || true

      - name: Append new training data
        run: |
          python scripts/append_dataset.py \
            --existing "$STATE_DIR/data_online.npz" \
            --out "$STATE_DIR/data_online.npz" \
            --width "$RUN_WIDTH" \
            --height "$RUN_HEIGHT" \
            --mines "$RUN_MINES" \
            --games "$RUN_GAMES" | tee "$STATE_DIR/append_log.txt"

      - name: Continue CNN training
        run: |
          RESUME_ARGS=""
          if [ -f "$STATE_DIR/model_online.pt" ]; then
            RESUME_ARGS="--resume $STATE_DIR/model_online.pt"
          fi
          python scripts/train_cnn.py \
            --data "$STATE_DIR/data_online.npz" \
            --epochs "$RUN_EPOCHS" \
            --batch-size 32 \
            --out "$STATE_DIR/model_online.pt" \
            $RESUME_ARGS | tee "$STATE_DIR/train_log.txt"

      - name: Evaluate continued model
        run: |
          python scripts/evaluate.py \
            --games 100 \
            --width "$RUN_WIDTH" \
            --height "$RUN_HEIGHT" \
            --mines "$RUN_MINES" \
            --model "$STATE_DIR/model_online.pt" | tee "$STATE_DIR/eval_log.txt"

      - name: Write latest result into repository
        run: |
          mkdir -p results
          {
            echo "# Latest Minesweeper Training Result"
            echo
            echo "- Run ID: $GITHUB_RUN_ID"
            echo "- Commit: $GITHUB_SHA"
            echo "- Board: ${RUN_WIDTH}x${RUN_HEIGHT}"
            echo "- Mines: ${RUN_MINES}"
            echo "- Appended games: ${RUN_GAMES}"
            echo "- Additional epochs: ${RUN_EPOCHS}"
            echo "- Generated at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "## Dataset append log"
            echo '```text'
            cat "$STATE_DIR/append_log.txt" || true
            echo '```'
            echo
            echo "## Training log"
            echo '```text'
            cat "$STATE_DIR/train_log.txt" || true
            echo '```'
            echo
            echo "## Evaluation log"
            echo '```text'
            cat "$STATE_DIR/eval_log.txt" || true
            echo '```'
          } > results/latest-training-result.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/latest-training-result.md
          git commit -m "Update latest training result" || echo "No result changes to commit"
          git push || true

      - name: Upload continued training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minesweeper-training-output
          path: |
            training_state/data_online.npz
            training_state/model_online.pt
            training_state/append_log.txt
            training_state/train_log.txt
            training_state/eval_log.txt
            results/latest-training-result.md
