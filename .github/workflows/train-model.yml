name: Train Minesweeper Model

on:
  workflow_dispatch:
    inputs:
      games:
        description: 'Number of simulated games for dataset collection'
        required: true
        default: '200'
      epochs:
        description: 'Training epochs'
        required: true
        default: '3'
      width:
        description: 'Board width'
        required: true
        default: '30'
      height:
        description: 'Board height'
        required: true
        default: '16'
      mines:
        description: 'Mine count'
        required: true
        default: '99'
  push:
    branches: [main]
    paths:
      - '.github/run-online-training.txt'

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      RUN_GAMES: ${{ github.event.inputs.games || '200' }}
      RUN_EPOCHS: ${{ github.event.inputs.epochs || '3' }}
      RUN_WIDTH: ${{ github.event.inputs.width || '30' }}
      RUN_HEIGHT: ${{ github.event.inputs.height || '16' }}
      RUN_MINES: ${{ github.event.inputs.mines || '99' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy torch

      - name: Collect dataset
        run: |
          python scripts/collect_dataset.py \
            --width "$RUN_WIDTH" \
            --height "$RUN_HEIGHT" \
            --mines "$RUN_MINES" \
            --games "$RUN_GAMES" \
            --out data_online.npz

      - name: Train CNN
        run: |
          python scripts/train_cnn.py \
            --data data_online.npz \
            --epochs "$RUN_EPOCHS" \
            --batch-size 32 \
            --out model_online.pt

      - name: Evaluate trained model
        run: |
          python scripts/evaluate.py \
            --games 50 \
            --width "$RUN_WIDTH" \
            --height "$RUN_HEIGHT" \
            --mines "$RUN_MINES" \
            --model model_online.pt

      - name: Upload dataset and model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minesweeper-training-output
          path: |
            data_online.npz
            model_online.pt
