name: Train Minesweeper Model

on:
  workflow_dispatch:
    inputs:
      games:
        description: 'Number of simulated games for dataset collection'
        required: true
        default: '200'
      epochs:
        description: 'Training epochs'
        required: true
        default: '3'
      width:
        description: 'Board width'
        required: true
        default: '30'
      height:
        description: 'Board height'
        required: true
        default: '16'
      mines:
        description: 'Mine count'
        required: true
        default: '99'

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy torch

      - name: Collect dataset
        run: |
          python scripts/collect_dataset.py \
            --width ${{ github.event.inputs.width }} \
            --height ${{ github.event.inputs.height }} \
            --mines ${{ github.event.inputs.mines }} \
            --games ${{ github.event.inputs.games }} \
            --out data_online.npz

      - name: Train CNN
        run: |
          python scripts/train_cnn.py \
            --data data_online.npz \
            --epochs ${{ github.event.inputs.epochs }} \
            --batch-size 32 \
            --out model_online.pt

      - name: Evaluate trained model
        run: |
          python scripts/evaluate.py \
            --games 50 \
            --width ${{ github.event.inputs.width }} \
            --height ${{ github.event.inputs.height }} \
            --mines ${{ github.event.inputs.mines }} \
            --model model_online.pt

      - name: Upload dataset and model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minesweeper-training-output
          path: |
            data_online.npz
            model_online.pt
