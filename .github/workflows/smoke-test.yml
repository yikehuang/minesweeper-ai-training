name: Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run smoke test
        run: python scripts/smoke_test.py

      - name: Run logic-only evaluation
        run: python scripts/evaluate.py --games 20 --width 9 --height 9 --mines 10
